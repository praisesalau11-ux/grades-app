<!DOCTYPE html>
<html>
<head>

  <title>Grades Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <img src="logo.png" alt="App Logo" class="logo">

    }

</body>
